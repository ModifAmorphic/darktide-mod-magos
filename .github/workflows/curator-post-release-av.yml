# Post-release AV/VT scan: post-release workflow, non-gating for publication,
# but fails on scan errors or detections.
#
# Triggered by repository_dispatch from the release workflow after assets
# are uploaded and attested. Scans the Windows release asset with Microsoft
# Defender and VirusTotal, then creates a GitHub issue if threats are detected.
#
# Uses repository_dispatch instead of on:release because events created with
# GITHUB_TOKEN do not trigger other workflows.
name: curator-post-release-av

on:
  repository_dispatch:
    types: [curator-release-assets-published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to scan
        required: true
        type: string
      windows_asset:
        description: Windows asset name
        required: true
        type: string

permissions:
  contents: read
  issues: write

env:
  VT_THRESHOLD_ENGINES: 3

jobs:
  scan-and-report:
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Resolve inputs
        id: resolve_inputs
        env:
          CLIENT_TAG_NAME: ${{ github.event.client_payload.tag_name }}
          CLIENT_WINDOWS_ASSET: ${{ github.event.client_payload.windows_asset }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_WINDOWS_ASSET: ${{ inputs.windows_asset }}
        run: |
          if ('${{ github.event_name }}' -eq 'repository_dispatch') {
            $tag = $env:CLIENT_TAG_NAME
            $asset = $env:CLIENT_WINDOWS_ASSET
          } else {
            $tag = $env:INPUT_TAG_NAME
            $asset = $env:INPUT_WINDOWS_ASSET
          }

          if ([string]::IsNullOrEmpty($tag)) {
            Write-Error "tag_name is empty - cannot proceed"
            exit 1
          }
          if ([string]::IsNullOrEmpty($asset)) {
            Write-Error "windows_asset is empty - cannot proceed"
            exit 1
          }

          echo "tag_name=$tag" >> $env:GITHUB_OUTPUT
          echo "windows_asset=$asset" >> $env:GITHUB_OUTPUT

      - name: Download Windows release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          INPUT_TAG_NAME: ${{ steps.resolve_inputs.outputs.tag_name }}
          INPUT_WINDOWS_ASSET: ${{ steps.resolve_inputs.outputs.windows_asset }}
        run: |
          gh release download "$INPUT_TAG_NAME" \
            --repo "$GH_REPO" \
            --pattern "$INPUT_WINDOWS_ASSET" \
            --dir .

      - name: Scan with Microsoft Defender
        id: defender_scan
        continue-on-error: true
        env:
          INPUT_WINDOWS_ASSET: ${{ steps.resolve_inputs.outputs.windows_asset }}
        run: |
          $asset = $env:INPUT_WINDOWS_ASSET
          $outputFile = "defender_output.txt"
          $fullPath = (Resolve-Path $asset).Path

          Write-Host "Starting Defender scan for: $fullPath"

          try {
            # Verify Defender is operational before scanning
            $defenderStatus = Get-MpComputerStatus -ErrorAction Stop

            # Check if Defender is in an operational scanning state
            $isOperational = $false
            $statusDetails = @()

            if ($null -eq $defenderStatus) {
              $statusDetails += "Defender status is null"
            } else {
              if ($defenderStatus.AMRunningMode -ne "Normal") {
                $statusDetails += "AMRunningMode is $($defenderStatus.AMRunningMode), expected Normal"
              } else {
                $isOperational = $true
              }

              if (-not $defenderStatus.AMServiceEnabled) {
                $isOperational = $false
                $statusDetails += "AMServiceEnabled is False"
              }

              if (-not $defenderStatus.AntivirusEnabled) {
                $isOperational = $false
                $statusDetails += "AntivirusEnabled is False"
              }

              if (-not $defenderStatus.RealTimeProtectionEnabled) {
                # RealTimeProtectionEnabled can be false without being a tool error
                # so we note it but do not treat it as non-operational
                $statusDetails += "RealTimeProtectionEnabled is False (noted but not blocking)"
              }
            }

            if (-not $isOperational) {
              "Defender is not in an operational scanning state:" | Out-File -FilePath $outputFile -Encoding utf8
              foreach ($detail in $statusDetails) {
                "  $detail" | Out-File -FilePath $outputFile -Append -Encoding utf8
              }
              "" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "Defender status details:" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  AMRunningMode: $($defenderStatus.AMRunningMode)" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  AMServiceEnabled: $($defenderStatus.AMServiceEnabled)" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  AntivirusEnabled: $($defenderStatus.AntivirusEnabled)" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  RealTimeProtectionEnabled: $($defenderStatus.RealTimeProtectionEnabled)" | Out-File -FilePath $outputFile -Append -Encoding utf8

              $errorMsg = "Defender is not operational: " + ($statusDetails -join "; ")
              echo "status=tool_error" >> $env:GITHUB_OUTPUT
              echo "error_message=$errorMsg" >> $env:GITHUB_OUTPUT
              Write-Error $errorMsg
              exit 1
            }

            # Record detection history before scan
            $detectionsBefore = Get-MpThreatDetection -ErrorAction SilentlyContinue
            $detectionsBeforeCount = if ($detectionsBefore) { $detectionsBefore.Count } else { 0 }

            # Record threat history before scan
            $threatsBefore = Get-MpThreat -ErrorAction SilentlyContinue
            $threatsBeforeCount = if ($threatsBefore) { $threatsBefore.Count } else { 0 }

            # Log pre-scan status
            if ($defenderStatus) {
              "Pre-scan Defender status:" | Out-File -FilePath $outputFile -Encoding utf8
              "  QuickScanOffset: $($defenderStatus.QuickScanOffset)" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  FullScanOffset: $($defenderStatus.FullScanOffset)" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Threats detected before scan: $threatsBeforeCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Detection count before scan: $detectionsBeforeCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "" | Out-File -FilePath $outputFile -Append -Encoding utf8
            }

            # Run the custom scan
            Start-MpScan -ScanType CustomScan -ScanPath $fullPath -ErrorAction Stop

            # Wait briefly for scan to complete and threat history to update
            Start-Sleep -Seconds 10

            # Record detection history after scan
            $detectionsAfter = Get-MpThreatDetection -ErrorAction SilentlyContinue
            $detectionsAfterCount = if ($detectionsAfter) { $detectionsAfter.Count } else { 0 }

            # Record threat history after scan
            $threatsAfter = Get-MpThreat -ErrorAction SilentlyContinue
            $threatsAfterCount = if ($threatsAfter) { $threatsAfter.Count } else { 0 }

            # Log post-scan status
            $statusAfter = Get-MpComputerStatus -ErrorAction SilentlyContinue
            if ($statusAfter) {
              "Post-scan Defender status:" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  QuickScanOffset: $($statusAfter.QuickScanOffset)" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  FullScanOffset: $($statusAfter.FullScanOffset)" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Threats detected after scan: $threatsAfterCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Detection count after scan: $detectionsAfterCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "" | Out-File -FilePath $outputFile -Append -Encoding utf8
            }

            # Determine status - on a fresh hosted runner, count increase after scanning the specific asset is acceptable as a detection signal
            if ($detectionsAfterCount -gt $detectionsBeforeCount) {
              # Detection count increased - treat as detection
              echo "status=detection" >> $env:GITHUB_OUTPUT
              "Scan completed with detection:" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Detection count increased from $detectionsBeforeCount to $detectionsAfterCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              if ($threatsAfterCount -gt $threatsBeforeCount) {
                "  Threat count also increased from $threatsBeforeCount to $threatsAfterCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              }
              # Log new detection details if available
              if ($detectionsAfter -and $detectionsBefore) {
                $newDetections = @($detectionsAfter | Where-Object { $_.ThreatID -notin $detectionsBefore.ThreatID })
                foreach ($det in $newDetections) {
                  "  Detection: $($det.ThreatName)" | Out-File -FilePath $outputFile -Append -Encoding utf8
                  "  ID: $($det.ThreatID)" | Out-File -FilePath $outputFile -Append -Encoding utf8
                  "" | Out-File -FilePath $outputFile -Append -Encoding utf8
                }
              }
              Write-Error "Defender detected threats"
              exit 1
            } elseif ($threatsAfterCount -gt $threatsBeforeCount) {
              # Threat history increased but detection count did not - still a detection signal
              echo "status=detection" >> $env:GITHUB_OUTPUT
              "Scan completed with detection (threat history increased):" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Threats before: $threatsBeforeCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Threats after: $threatsAfterCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              # Log new threat details if available
              if ($threatsAfter -and $threatsBefore) {
                $newThreats = @($threatsAfter | Where-Object { $_.ThreatID -notin $threatsBefore.ThreatID })
                foreach ($threat in $newThreats) {
                  "  Threat: $($threat.ThreatName)" | Out-File -FilePath $outputFile -Append -Encoding utf8
                  "  ID: $($threat.ThreatID)" | Out-File -FilePath $outputFile -Append -Encoding utf8
                  "  Severity: $($threat.SeverityID)" | Out-File -FilePath $outputFile -Append -Encoding utf8
                  "" | Out-File -FilePath $outputFile -Append -Encoding utf8
                }
              }
              Write-Error "Defender threat history indicates new detection"
              exit 1
            } else {
              # Scan completed with no detection
              echo "status=clean" >> $env:GITHUB_OUTPUT
              "Scan completed successfully with no detection" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Threats before: $threatsBeforeCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Threats after: $threatsAfterCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Detections before: $detectionsBeforeCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              "  Detections after: $detectionsAfterCount" | Out-File -FilePath $outputFile -Append -Encoding utf8
              Write-Host "Defender scan completed successfully with no detection"
              exit 0
            }
          } catch {
            # Scan command failed
            $errorMsg = $_.Exception.Message
            echo "status=tool_error" >> $env:GITHUB_OUTPUT
            echo "error_message=$errorMsg" >> $env:GITHUB_OUTPUT
            "Defender scan tool error:" | Out-File -FilePath $outputFile -Encoding utf8
            "  Error: $errorMsg" | Out-File -FilePath $outputFile -Append -Encoding utf8
            "  Full error: $_" | Out-File -FilePath $outputFile -Append -Encoding utf8
            Write-Error "Defender scan tool error: $errorMsg"
            exit 1
          }

      - name: Check VirusTotal API key
        id: vt_check
        env:
          VT_API_KEY_TEST: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          if (-not [string]::IsNullOrEmpty($env:VT_API_KEY_TEST)) {
            echo "enabled=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "enabled=false" >> $env:GITHUB_OUTPUT
            Write-Error "VIRUSTOTAL_API_KEY not configured - this workflow requires it"
            exit 1
          }

      - name: Submit to VirusTotal
        id: vt_submit
        if: steps.vt_check.outputs.enabled == 'true'
        continue-on-error: true
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          INPUT_WINDOWS_ASSET: ${{ steps.resolve_inputs.outputs.windows_asset }}
        run: |
          function Write-GitHubOutput {
            param([string]$Name, [string]$Value)
            $delimiter = [Guid]::NewGuid().ToString()
            Add-Content -Path $env:GITHUB_OUTPUT -Value "$Name<<$delimiter"
            Add-Content -Path $env:GITHUB_OUTPUT -Value $Value
            Add-Content -Path $env:GITHUB_OUTPUT -Value $delimiter
          }

          $asset = $env:INPUT_WINDOWS_ASSET
          $assetSize = (Get-Item $asset).Length
          $apiKey = $env:VT_API_KEY

          try {
            if ($assetSize -gt 32MB) {
              Write-Host "Asset larger than 32MB, using upload URL endpoint"
              $uploadUrlResp = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files/upload_url" `
                -Headers @{ "x-apikey" = $apiKey } -Method Get
              $uploadUrl = $uploadUrlResp.data
              $uploadResp = Invoke-RestMethod -Uri $uploadUrl `
                -Headers @{ "x-apikey" = $apiKey } -Method Post -Form @{ file = Get-Item $asset }
            } else {
              Write-Host "Asset smaller than 32MB, using direct upload endpoint"
              $uploadResp = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files" `
                -Headers @{ "x-apikey" = $apiKey } -Method Post -Form @{ file = Get-Item $asset }
            }

            $analysisId = $uploadResp.data.id
            "analysis_id=$analysisId" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            echo "error=false" >> $env:GITHUB_OUTPUT
            echo "error_message=" >> $env:GITHUB_OUTPUT
            echo "Submitted to VirusTotal, analysis ID: $analysisId"
          } catch {
            $errorMsg = $_.Exception.Message
            echo "error=true" >> $env:GITHUB_OUTPUT
            Write-GitHubOutput -Name "error_message" -Value $errorMsg
            Write-Error "VirusTotal submission failed: $errorMsg"
            throw
          }

      - name: Poll VirusTotal analysis
        id: vt_poll
        if: steps.vt_check.outputs.enabled == 'true' && steps.vt_submit.outputs.error != 'true'
        continue-on-error: true
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          INPUT_WINDOWS_ASSET: ${{ steps.resolve_inputs.outputs.windows_asset }}
        run: |
          function Write-GitHubOutput {
            param([string]$Name, [string]$Value)
            $delimiter = [Guid]::NewGuid().ToString()
            Add-Content -Path $env:GITHUB_OUTPUT -Value "$Name<<$delimiter"
            Add-Content -Path $env:GITHUB_OUTPUT -Value $Value
            Add-Content -Path $env:GITHUB_OUTPUT -Value $delimiter
          }

          $analysisId = $env:analysis_id
          $apiKey = $env:VT_API_KEY
          $maxWait = 1800 # 30 minutes
          # 20 seconds to respect VirusTotal public API quota: 4 requests/minute.
          # Large uploads require an upload-url lookup (1 request) plus upload (1 request),
          # so we delay the first poll by 20 seconds to stay within quota.
          $interval = 20
          $elapsed = 0

          try {
            # Delay first poll to avoid exceeding quota immediately after upload-url lookup + upload
            Start-Sleep -Seconds $interval
            $elapsed += $interval

            while ($elapsed -lt $maxWait) {
              $resp = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/analyses/$analysisId" `
                -Headers @{ "x-apikey" = $apiKey }
              $status = $resp.data.attributes.status

              if ($status -eq "completed") {
                $stats = $resp.data.attributes.stats
                $malicious = $stats.malicious
                $suspicious = $stats.suspicious

                echo "malicious=$malicious" >> $env:GITHUB_OUTPUT
                echo "suspicious=$suspicious" >> $env:GITHUB_OUTPUT

                # Compute SHA256 and construct permalink
                $asset = $env:INPUT_WINDOWS_ASSET
                $sha256 = (Get-FileHash -Path $asset -Algorithm SHA256).Hash.ToLower()
                $permalink = "https://www.virustotal.com/gui/file/$sha256"
                echo "permalink=$permalink" >> $env:GITHUB_OUTPUT

                Write-Host "VirusTotal analysis completed: $malicious malicious, $suspicious suspicious"
                if ($permalink) { Write-Host "Permalink: $permalink" }
                echo "error=false" >> $env:GITHUB_OUTPUT
                echo "error_message=" >> $env:GITHUB_OUTPUT
                exit 0
              }

              Write-Host "Analysis status: $status, waiting..."
              Start-Sleep -Seconds $interval
              $elapsed += $interval
            }

            Write-Error "VirusTotal analysis timed out after $maxWait seconds"
            echo "error=true" >> $env:GITHUB_OUTPUT
            echo "error_message=Analysis timed out after $maxWait seconds" >> $env:GITHUB_OUTPUT
            exit 1
          } catch {
            $errorMsg = $_.Exception.Message
            echo "error=true" >> $env:GITHUB_OUTPUT
            Write-GitHubOutput -Name "error_message" -Value $errorMsg
            Write-Error "VirusTotal polling failed: $errorMsg"
            throw
          }

      - name: Write workflow summary
        if: always() && steps.resolve_inputs.outcome == 'success'
        shell: bash
        env:
          RESOLVE_TAG_NAME: ${{ steps.resolve_inputs.outputs.tag_name }}
          RESOLVE_WINDOWS_ASSET: ${{ steps.resolve_inputs.outputs.windows_asset }}
          DEFENDER_STATUS: ${{ steps.defender_scan.outputs.status }}
          DEFENDER_ERROR_MESSAGE: ${{ steps.defender_scan.outputs.error_message }}
          VT_ENABLED: ${{ steps.vt_check.outputs.enabled }}
          VT_ERROR: ${{ steps.vt_submit.outputs.error }}
          VT_POLL_ERROR: ${{ steps.vt_poll.outputs.error }}
          VT_PERMALINK: ${{ steps.vt_poll.outputs.permalink }}
          VT_MALICIOUS: ${{ steps.vt_poll.outputs.malicious }}
          VT_SUSPICIOUS: ${{ steps.vt_poll.outputs.suspicious }}
          VT_SUBMIT_ERROR_MESSAGE: ${{ steps.vt_submit.outputs.error_message }}
          VT_POLL_ERROR_MESSAGE: ${{ steps.vt_poll.outputs.error_message }}
        run: |
          TAG="$RESOLVE_TAG_NAME"
          ASSET="$RESOLVE_WINDOWS_ASSET"
          DEFENDER_STATUS="$DEFENDER_STATUS"
          DEFENDER_ERROR_MESSAGE="$DEFENDER_ERROR_MESSAGE"
          VT_ENABLED="$VT_ENABLED"
          VT_ERROR="$VT_ERROR"
          VT_POLL_ERROR="$VT_POLL_ERROR"
          VT_PERMALINK="$VT_PERMALINK"
          VT_MALICIOUS="$VT_MALICIOUS"
          VT_SUSPICIOUS="$VT_SUSPICIOUS"
          VT_SUBMIT_ERROR_MESSAGE="$VT_SUBMIT_ERROR_MESSAGE"
          VT_POLL_ERROR_MESSAGE="$VT_POLL_ERROR_MESSAGE"

          echo "# Post-Release AV/VT Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release Tag:** $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "**Asset Scanned:** $ASSET" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Microsoft Defender" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$DEFENDER_STATUS" ]; then
            echo "**Status:** $DEFENDER_STATUS" >> "$GITHUB_STEP_SUMMARY"
            if [ "$DEFENDER_STATUS" = "clean" ]; then
              echo "**Result:** No threats detected" >> "$GITHUB_STEP_SUMMARY"
            elif [ "$DEFENDER_STATUS" = "detection" ]; then
              echo "**Result:** Threat detected" >> "$GITHUB_STEP_SUMMARY"
            elif [ "$DEFENDER_STATUS" = "tool_error" ]; then
              echo "**Result:** Scan tool error" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "**Status:** unknown (scan did not run)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "$DEFENDER_ERROR_MESSAGE" ]; then
            echo "**Error:** $DEFENDER_ERROR_MESSAGE" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f defender_output.txt ]; then
            cat defender_output.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Defender output file not found" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "## VirusTotal" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$VT_ENABLED" != "true" ]; then
            echo "**Status:** configuration_error" >> "$GITHUB_STEP_SUMMARY"
            echo "**Result:** VIRUSTOTAL_API_KEY not configured" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$VT_ERROR" = "true" ] || [ "$VT_POLL_ERROR" = "true" ]; then
            echo "**Status:** tool_error" >> "$GITHUB_STEP_SUMMARY"
            echo "**Result:** VirusTotal scan failed" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$VT_SUBMIT_ERROR_MESSAGE" ]; then
              echo "**Submission Error:** $VT_SUBMIT_ERROR_MESSAGE" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "$VT_POLL_ERROR_MESSAGE" ]; then
              echo "**Poll Error:** $VT_POLL_ERROR_MESSAGE" >> "$GITHUB_STEP_SUMMARY"
            fi
          elif [ -n "$VT_PERMALINK" ]; then
            TOTAL=$((VT_MALICIOUS + VT_SUSPICIOUS))
            THRESHOLD="$VT_THRESHOLD_ENGINES"
            if [ "$TOTAL" -ge "$THRESHOLD" ]; then
              echo "**Status:** detection" >> "$GITHUB_STEP_SUMMARY"
              echo "**Result:** Detections found (meets threshold)" >> "$GITHUB_STEP_SUMMARY"
            elif [ "$TOTAL" -gt 0 ]; then
              echo "**Status:** below_threshold" >> "$GITHUB_STEP_SUMMARY"
              echo "**Result:** Detections found but below threshold ($TOTAL < $THRESHOLD)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "**Status:** clean" >> "$GITHUB_STEP_SUMMARY"
              echo "**Result:** No detections" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "**Permalink:** $VT_PERMALINK" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Malicious Engines:** $VT_MALICIOUS" >> "$GITHUB_STEP_SUMMARY"
            echo "**Suspicious Engines:** $VT_SUSPICIOUS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Status:** unknown" >> "$GITHUB_STEP_SUMMARY"
            echo "**Result:** Results not available" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Determine if issue is needed
        id: check
        if: always() && steps.resolve_inputs.outcome == 'success'
        shell: bash
        env:
          DEFENDER_STATUS: ${{ steps.defender_scan.outputs.status }}
          VT_MALICIOUS: ${{ steps.vt_poll.outputs.malicious }}
          VT_SUSPICIOUS: ${{ steps.vt_poll.outputs.suspicious }}
          VT_THRESHOLD_ENGINES: ${{ env.VT_THRESHOLD_ENGINES }}
        run: |
          NEEDS_ISSUE="false"
          REASON=""

          # Check Defender status - only create issue for detection
          DEFENDER_STATUS="$DEFENDER_STATUS"
          if [ "$DEFENDER_STATUS" = "detection" ]; then
            NEEDS_ISSUE="true"
            REASON="Microsoft Defender detected a threat"
          fi

          # Check VT threshold - only create issue if threshold met
          MALICIOUS="$VT_MALICIOUS"
          SUSPICIOUS="$VT_SUSPICIOUS"
          THRESHOLD="$VT_THRESHOLD_ENGINES"

          if [ -n "$MALICIOUS" ] && [ -n "$SUSPICIOUS" ]; then
            TOTAL=$((MALICIOUS + SUSPICIOUS))
            if [ "$TOTAL" -ge "$THRESHOLD" ]; then
              NEEDS_ISSUE="true"
              if [ -n "$REASON" ]; then
                REASON="$REASON; VirusTotal detection count ($TOTAL) meets or exceeds threshold ($THRESHOLD)"
              else
                REASON="VirusTotal detection count ($TOTAL) meets or exceeds threshold ($THRESHOLD)"
              fi
            fi
          fi

          echo "needs_issue=$NEEDS_ISSUE" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT

      - name: Check for existing open issue
        id: check_existing
        if: always() && steps.check.outputs.needs_issue == 'true' && steps.resolve_inputs.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RESOLVE_TAG_NAME: ${{ steps.resolve_inputs.outputs.tag_name }}
        shell: bash
        run: |
          TAG="$RESOLVE_TAG_NAME"
          TITLE="AV detection alert for release $TAG"

          # Search for existing open issues with this title using gh --jq with env.TITLE
          ISSUES=$(TITLE="$TITLE" gh issue list --repo "$GH_REPO" --search "$TITLE" --state open --json number,title --jq '.[] | select(.title == env.TITLE) | .number')

          if [ -n "$ISSUES" ]; then
            echo "existing_issue=$ISSUES" >> $GITHUB_OUTPUT
            echo "Found existing open issue #$ISSUES, will not create duplicate"
          else
            echo "existing_issue=" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub issue
        if: always() && steps.check.outputs.needs_issue == 'true' && steps.check_existing.outputs.existing_issue == '' && steps.resolve_inputs.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RESOLVE_TAG_NAME: ${{ steps.resolve_inputs.outputs.tag_name }}
          RESOLVE_WINDOWS_ASSET: ${{ steps.resolve_inputs.outputs.windows_asset }}
          CHECK_REASON: ${{ steps.check.outputs.reason }}
          DEFENDER_STATUS: ${{ steps.defender_scan.outputs.status }}
          VT_ENABLED: ${{ steps.vt_check.outputs.enabled }}
          VT_POLL_PERMALINK: ${{ steps.vt_poll.outputs.permalink }}
          VT_POLL_MALICIOUS: ${{ steps.vt_poll.outputs.malicious }}
          VT_POLL_SUSPICIOUS: ${{ steps.vt_poll.outputs.suspicious }}
        shell: bash
        run: |
          TAG="$RESOLVE_TAG_NAME"
          ASSET="$RESOLVE_WINDOWS_ASSET"
          TITLE="AV detection alert for release $TAG"
          REASON="$CHECK_REASON"
          DEFENDER_STATUS="$DEFENDER_STATUS"
          VT_ENABLED="$VT_ENABLED"
          VT_POLL_PERMALINK="$VT_POLL_PERMALINK"
          VT_POLL_MALICIOUS="$VT_POLL_MALICIOUS"
          VT_POLL_SUSPICIOUS="$VT_POLL_SUSPICIOUS"

          # Create issue body file
          cat > issue.md <<'EOF'
          **Release Tag:** `TAG_PLACEHOLDER`
          **Asset:** `ASSET_PLACEHOLDER`

          **Reason:** REASON_PLACEHOLDER

          ## Microsoft Defender

          **Status:** `DEFENDER_STATUS_PLACEHOLDER`

          ```
          DEFENDER_OUTPUT_PLACEHOLDER
          ```

          ## VirusTotal

          EOF

          # Replace placeholders
          sed -i "s/TAG_PLACEHOLDER/$TAG/" issue.md
          sed -i "s/ASSET_PLACEHOLDER/$ASSET/" issue.md
          sed -i "s/REASON_PLACEHOLDER/$REASON/" issue.md
          sed -i "s/DEFENDER_STATUS_PLACEHOLDER/$DEFENDER_STATUS/" issue.md

          # Append Defender output from file using sed
          if [ -f defender_output.txt ]; then
            sed -i '/DEFENDER_OUTPUT_PLACEHOLDER/r defender_output.txt' issue.md
          else
            sed -i 's/DEFENDER_OUTPUT_PLACEHOLDER/Defender output file not found/' issue.md
          fi
          sed -i '/DEFENDER_OUTPUT_PLACEHOLDER/d' issue.md

          # Append VirusTotal section (always present if issue is created, since VT key is required)
          if [ -n "$VT_POLL_PERMALINK" ]; then
            cat >> issue.md <<'EOF'

          **Permalink:** VT_PERMALINK_PLACEHOLDER

          **Malicious Engines:** VT_MALICIOUS_PLACEHOLDER
          **Suspicious Engines:** VT_SUSPICIOUS_PLACEHOLDER

          EOF

            sed -i "s|VT_PERMALINK_PLACEHOLDER|$VT_POLL_PERMALINK|" issue.md
            sed -i "s/VT_MALICIOUS_PLACEHOLDER/$VT_POLL_MALICIOUS/" issue.md
            sed -i "s/VT_SUSPICIOUS_PLACEHOLDER/$VT_POLL_SUSPICIOUS/" issue.md
          else
            cat >> issue.md <<'EOF'

          Scan completed (see workflow run summary for details)

          EOF
          fi

          cat >> issue.md <<'EOF'

          ## Recommended Actions

          1. Review the scan results above
          2. If this is a false positive, submit the file to the affected vendor:
              - Microsoft: https://www.microsoft.com/en-us/wdsi/filesubmission
              - For other vendors, visit their respective false-positive submission portals
          3. Update this issue with the submission status and any responses received
          EOF

          gh issue create --repo "$GH_REPO" --title "$TITLE" --body-file issue.md
          echo "Created GitHub issue for AV detection alert"

      - name: Fail workflow on errors or detections
        if: always() && steps.resolve_inputs.outcome == 'success'
        shell: bash
        env:
          DEFENDER_STATUS: ${{ steps.defender_scan.outputs.status }}
          VT_ENABLED: ${{ steps.vt_check.outputs.enabled }}
          VT_ERROR: ${{ steps.vt_submit.outputs.error }}
          VT_POLL_ERROR: ${{ steps.vt_poll.outputs.error }}
          VT_MALICIOUS: ${{ steps.vt_poll.outputs.malicious }}
          VT_SUSPICIOUS: ${{ steps.vt_poll.outputs.suspicious }}
          VT_THRESHOLD_ENGINES: ${{ env.VT_THRESHOLD_ENGINES }}
        run: |
          DEFENDER_STATUS="$DEFENDER_STATUS"
          VT_ENABLED="$VT_ENABLED"
          VT_ERROR="$VT_ERROR"
          VT_POLL_ERROR="$VT_POLL_ERROR"
          VT_MALICIOUS="$VT_MALICIOUS"
          VT_SUSPICIOUS="$VT_SUSPICIOUS"
          THRESHOLD="$VT_THRESHOLD_ENGINES"

          SHOULD_FAIL="false"
          FAIL_REASON=""

          # Fail on Defender tool error or detection
          if [ "$DEFENDER_STATUS" = "tool_error" ]; then
            SHOULD_FAIL="true"
            FAIL_REASON="Microsoft Defender scan tool error"
          elif [ "$DEFENDER_STATUS" = "detection" ]; then
            SHOULD_FAIL="true"
            FAIL_REASON="Microsoft Defender detected a threat"
          elif [ -z "$DEFENDER_STATUS" ]; then
            SHOULD_FAIL="true"
            FAIL_REASON="Microsoft Defender scan did not run"
          fi

          # Fail on missing VT key
          if [ "$VT_ENABLED" != "true" ]; then
            SHOULD_FAIL="true"
            if [ -n "$FAIL_REASON" ]; then
              FAIL_REASON="$FAIL_REASON; VIRUSTOTAL_API_KEY is required but not configured"
            else
              FAIL_REASON="VIRUSTOTAL_API_KEY is required but not configured"
            fi
          fi

          # Fail on VT errors
          if [ "$VT_ERROR" = "true" ] || [ "$VT_POLL_ERROR" = "true" ]; then
            SHOULD_FAIL="true"
            if [ -n "$FAIL_REASON" ]; then
              FAIL_REASON="$FAIL_REASON; VirusTotal scan failed (submission or polling error)"
            else
              FAIL_REASON="VirusTotal scan failed (submission or polling error)"
            fi
          fi

          # Fail on VT detection threshold
          if [ -n "$VT_MALICIOUS" ] && [ -n "$VT_SUSPICIOUS" ]; then
            TOTAL=$((VT_MALICIOUS + VT_SUSPICIOUS))
            if [ "$TOTAL" -ge "$THRESHOLD" ]; then
              SHOULD_FAIL="true"
              if [ -n "$FAIL_REASON" ]; then
                FAIL_REASON="$FAIL_REASON; VirusTotal detection count ($TOTAL) meets or exceeds threshold ($THRESHOLD)"
              else
                FAIL_REASON="VirusTotal detection count ($TOTAL) meets or exceeds threshold ($THRESHOLD)"
              fi
            fi
          fi

          if [ "$SHOULD_FAIL" = "true" ]; then
            echo "Workflow failed: $FAIL_REASON"
            exit 1
          fi

          echo "All scanners completed successfully with no detections"
